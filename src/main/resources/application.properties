spring.application.name=WordGame

# Database Configuration
spring.datasource.url=jdbc:postgresql://dpg-d7u6ouosfn5c73co9t3g-a.oregon-postgres.render.com/wordgame_1awx
spring.datasource.username=${USERNAME}
spring.datasource.password=${PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration - FIXED DIALECT FOR HIBERNATE 7.x
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080
spring.web.error.include-message=always

# Logging
logging.level.com.slangify=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Connection Pooling (Optional but recommended)
spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.connectionTimeout=30000

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTTokenGenerationThatIsVeryLongAndSecure1234567890
app.jwt.expiration=86400000

# Logging (to debug any issues)
logging.level.org.springdoc=DEBUG
